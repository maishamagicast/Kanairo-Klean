<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarketPlace | Kanairo</title>
    <link rel="icon" href="/images/garbage favicon.png" type="image/png">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <header>
        <p class="brand">Kanairo Klean</p>
        <nav class="navbar">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="compliance.html">Compliance</a></li>
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="marketplace.html" aria-current="page">Marketplace</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div id="ticker-root" class="ticker-mount mkt-ticker-sticky"></div>

        <section id="marketplace-hero">
            <span class="eyebrow">— Kanairo Exchange</span>
            <h1 class="section-header">Live Material Market</h1>
        </section>

        <section id="marketplace-app">
            <div id="marketplace-app-root"></div>
        </section>
    </main>

    <footer>
        <p>&copy; <span id="current-year"></span> Kanairo. All rights reserved.</p>
        <script>
            document.getElementById('current-year').textContent = new Date().getFullYear();
            window.addEventListener('scroll', () => {
                const header = document.querySelector('header');
                if (window.scrollY > 50) {
                    header.classList.add('scrolled');
                } else {
                    header.classList.remove('scrolled');
                }
            });
        </script>
    </footer>

    <!-- React (CDN, production build, deferred so it never blocks parsing) -->
    <script defer src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script defer src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script defer src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script defer src="js/reveal.js"></script>
</body>
<script type="module" src="js/payments.js"></script>
<script type="module" src="js/marketplace.js"></script>
</html>
